<!-- ============================================================
  Agent 1 — Login Page: Glassmorphism Card + GSAP animated bg
  ============================================================ -->
<div class="login-wrapper">

  <!-- Animated background orbs -->
  <div class="login-bg-orb orb-1"></div>
  <div class="login-bg-orb orb-2"></div>
  <div class="login-bg-orb orb-3"></div>

  <!-- Glassmorphism Card -->
  <div class="login-card" #card>

    <!-- Logo / Brand -->
    <div class="brand" #logoRef>
      <div class="brand-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 01-8 0"/>
        </svg>
      </div>
      <div>
        <h1 class="brand-name">KishoStore</h1>
        <p class="brand-sub">Admin Dashboard</p>
      </div>
    </div>

    <h2 class="card-title">مرحباً بعودتك</h2>
    <p class="card-subtitle">سجّل دخولك للوصول إلى لوحة التحكم</p>

    <!-- Login Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate autocomplete="off">

      <!-- Email Field -->
      <div class="form-field" [class.field-error]="emailCtrl.invalid && emailCtrl.touched">
        <label for="email">البريد الإلكتروني</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="admin@kishostore.com"
            autocomplete="email"
          />
        </div>
        <span class="error-msg" *ngIf="emailCtrl.hasError('required') && emailCtrl.touched">البريد الإلكتروني مطلوب</span>
        <span class="error-msg" *ngIf="emailCtrl.hasError('email') && emailCtrl.touched">صيغة البريد الإلكتروني غير صحيحة</span>
      </div>

      <!-- Password Field -->
      <div class="form-field" [class.field-error]="passCtrl.invalid && passCtrl.touched">
        <label for="password">كلمة المرور</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="••••••••"
            autocomplete="current-password"
          />
          <button type="button" class="password-toggle" (click)="showPassword = !showPassword">
            <svg *ngIf="!showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
            <svg *ngIf="showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
        <span class="error-msg" *ngIf="passCtrl.hasError('required') && passCtrl.touched">كلمة المرور مطلوبة</span>
        <span class="error-msg" *ngIf="passCtrl.hasError('minlength') && passCtrl.touched">كلمة المرور يجب أن تكون 8 أحرف على الأقل</span>
      </div>

      <!-- Submit -->
      <button
        type="submit"
        class="btn-login"
        [disabled]="isLoading"
        [class.loading]="isLoading"
      >
        <span *ngIf="!isLoading">تسجيل الدخول</span>
        <span *ngIf="isLoading" class="spinner-text">
          <span class="spinner"></span>
          جاري التحقق...
        </span>
      </button>

    </form>

    <p class="footer-note">KishoStore Admin Panel &copy; {{ currentYear }}</p>
  </div>
</div>
